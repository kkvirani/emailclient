services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postal
      POSTGRES_PASSWORD: postal
      POSTGRES_DB: postal
    ports:
      - "5432:5432"
    volumes:
      - postal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postal -d postal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postal_pgdata:
